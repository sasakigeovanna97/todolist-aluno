<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>To Do List - Geovanna</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      background: #f2f2f7;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: 360px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1c1c1e;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #e5e5ea;
      font-size: 14px;
      outline: none;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 0 15px;
      background: #007aff;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #0063cc;
    }

    ul {
      list-style: none;
    }

    li {
      background: white;
      border-radius: 15px;
      padding: 12px 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.2s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    li:hover {
      transform: scale(1.02);
    }

    .task-text {
      font-size: 15px;
      color: #1c1c1e;
    }

    .done {
      text-decoration: line-through;
      color: #8e8e93;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .check {
      background: #34c759;
    }

    .delete {
      background: #ff3b30;
    }

    .actions button {
      font-size: 14px;
      padding: 6px 10px;
      border-radius: 8px;
    }

  </style>
</head>
<body>

  <div class="app">
    <h1>Minhas Tarefas</h1>

    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Adicionar tarefa">
      <button onclick="addTask()">+</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script>
    function addTask() {
      const input = document.getElementById("taskInput");
      const text = input.value.trim();

      if (text === "") return;

      const li = document.createElement("li");

      li.innerHTML = `
        <span class="task-text">${text}</span>
        <div class="actions">
          <button class="check" onclick="toggleTask(this)">✓</button>
          <button class="delete" onclick="removeTask(this)">✕</button>
        </div>
      `;

      document.getElementById("taskList").appendChild(li);
      input.value = "";
    }

    function removeTask(btn) {
      btn.parentElement.parentElement.remove();
    }

    function toggleTask(btn) {
      const task = btn.parentElement.parentElement.querySelector(".task-text");
      task.classList.toggle("done");
    }
  </script>

</body>
</html>
